<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de M3U | Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

body {
    margin: 0;
    padding: 0;
    background-color: #080710;
    background-image: 
        radial-gradient(at 0% 0%, rgba(155, 89, 182, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(52, 152, 219, 0.15) 0px, transparent 50%);
    color: #f3f4f6;
    display: flex;
    justify-content: center;
    padding: 60px 20px;
    min-height: 100vh;
}

/* Container Principal */
.panel {
    width: 100%;
    max-width: 800px;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    padding: 40px;
}

/* Cabeçalho Clean */
.header {
    text-align: center;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 35px;
    background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Área de Inputs */
.login {
    display: flex;
    gap: 15px;
    margin-bottom: 40px;
}

.login input {
    flex: 1;
    padding: 16px 20px;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.05);
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: all 0.3s ease;
}

.login input:focus {
    border-color: #6366f1;
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
}

.login button {
    padding: 0 30px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
    color: #fff;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
}

.login button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
}

/* Grid de Resultados */
#resultado {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

/* Cards dos Servidores modernizados */
.server {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 18px;
    padding: 22px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: all 0.3s ease;
}

.server:hover {
    border-color: rgba(99, 102, 241, 0.3);
    background: rgba(255, 255, 255, 0.04);
    transform: translateY(-3px);
}

.server-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

.server-name {
    font-weight: 600;
    font-size: 18px;
    color: #f3f4f6;
}

.server-link {
    font-size: 12px;
    word-break: break-all;
    color: #9ca3af;
    line-height: 1.5;
    margin-bottom: 20px;
    background: rgba(0, 0, 0, 0.2);
    padding: 10px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.02);
}

.actions {
    display: flex;
    gap: 10px;
}

.actions button {
    flex: 1;
    padding: 12px 0;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
}

/* Cores dos novos Botões */
.copy { 
    background: rgba(255, 255, 255, 0.08); 
    color: #fff; 
}
.copy:hover { background: rgba(255, 255, 255, 0.15); }

.dns { 
    background: rgba(99, 102, 241, 0.15); 
    color: #a5b4fc; 
}
.dns:hover { background: rgba(99, 102, 241, 0.25); }

/* Botão de feedback "Copiado" */
.actions button.copiado { 
    background: #10b981 !important; 
    color: #fff !important; 
}

/* Botão de Teste (?) estilizado como link externo */
.testar { 
    background: rgba(255, 255, 255, 0.05); 
    color: #9ca3af; 
    max-width: 45px;
}
.testar:hover { 
    background: rgba(239, 68, 68, 0.15); 
    color: #ef4444; 
}

/* Status Online Discreto no topo do card */
.status-badge {
    width: 8px;
    height: 8px;
    background-color: #10b981;
    border-radius: 50%;
    box-shadow: 0 0 8px #10b981;
}

@media(max-width: 680px){
    .login { flex-direction: column; }
    .login button { padding: 16px; }
    #resultado { grid-template-columns: 1fr; }
    .panel { padding: 20px; }
}
</style>
</head>
<body>

<div class="panel">
    <div class="header">M3U Playlist Generator</div>

    <div class="login">
        <input id="user" placeholder="Nome de usuário">
        <input id="pass" type="password" placeholder="Senha do acesso">
        <button onclick="gerar()">Gerar Painel</button>
    </div>

    <div id="resultado"></div>
</div>

<script>
const servidores = [
    {nome:"🛸 Galaxy", url:"http://galaxy.blcplay.com"},
    {nome:"🧿 Seven", url:"http://seven.blcplay.com"},
    {nome:"💣 Explosion", url:"http://nsync.space"},
    {nome:"🌑 Lunar", url:"http://lunar.kkrototv.fun"},
    {nome:"🏛️ Atena", url:"http://atena.kkrototv.fun"},
    {nome:"⚡ Speed", url:"http://netuno.live"},
    {nome:"☀️ Solar", url:"http://solar.kkrototv.fun"},
    {nome:"🌬️ Venus", url:"http://venus.blcplay.com"},
    {nome:"🔥 Fire", url:"http://fire.kkrototv.fun"}
];

function gerar(){
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(!user || !pass){
        alert("Por favor, preencha o usuário e a senha.");
        return;
    }

    let resultado = document.getElementById("resultado");
    resultado.innerHTML = "";

    servidores.forEach((s,i)=>{
        let link = `${s.url}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=mpegts`;

        let div = document.createElement("div");
        div.className = "server";
        div.innerHTML = `
            <div>
                <div class="server-header">
                    <div class="server-name">${s.nome}</div>
                    <div class="status-badge"></div>
                </div>
                <div class="server-link">${link}</div>
            </div>
            <div class="actions">
                <button id="m3u${i}" class="copy">Copiar M3U</button>
                <button id="dns${i}" class="dns">DNS</button>
                <button class="testar" onclick="testar('${s.url}')" title="Testar Conexão">↗</button>
            </div>
        `;
        resultado.appendChild(div);

        document.getElementById(`m3u${i}`).onclick = function(){
            navigator.clipboard.writeText(link);
            this.innerText = "Copiado!";
            this.classList.add("copiado");
            setTimeout(() => { this.innerText = "Copiar M3U"; this.classList.remove("copiado"); }, 2000);
        };

        document.getElementById(`dns${i}`).onclick = function(){
            navigator.clipboard.writeText(s.url);
            this.innerText = "Copiado!";
            this.classList.add("copiado");
            setTimeout(() => { this.innerText = "DNS"; this.classList.remove("copiado"); }, 2000);
        };
    });
}

function testar(url){ window.open(url, "_blank"); }
</script>

</body>
</html>
