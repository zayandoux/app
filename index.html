<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M3U Hub | Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* Sistema de Cores e Temas */
:root {
    --bg-main: #0c0a09;
    --bg-sidebar: #1c1917;
    --bg-card: #262220;
    --border: rgba(255, 255, 255, 0.06);
    --text-main: #f5f5f4;
    --text-muted: #a8a29e;
    --bg-input: #1c1917;
    --accent: #f97316; /* Laranja Moderno */
    --accent-hover: #ea580c;
    --shadow: rgba(0,0,0,0.4);
}

[data-theme="light"] {
    --bg-main: #fafaf9;
    --bg-sidebar: #ffffff;
    --bg-card: #f5f5f4;
    --border: rgba(0, 0, 0, 0.08);
    --text-main: #1c1917;
    --text-muted: #78716c;
    --bg-input: #f5f5f4;
    --accent: #ea580c;
    --accent-hover: #c2410c;
    --shadow: rgba(0,0,0,0.05);
}

* {
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
    margin: 0;
    padding: 0;
    transition: background-color 0.2s, border-color 0.2s, color 0.2s;
}

body {
    background-color: var(--bg-main);
    color: var(--text-main);
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* --- COLUNA ESQUERDA: SIDEBAR DE CONTROLE --- */
.sidebar {
    width: 340px;
    background-color: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    padding: 40px 30px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 10px 0 30px var(--shadow);
    z-index: 10;
}

.brand h2 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
}
.brand p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
}

/* Formulário Vertical */
.form-container {
    margin-top: 40px;
    flex-grow: 1;
}

.input-wrapper {
    position: relative;
    margin-bottom: 20px;
}

.input-wrapper label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    color: var(--text-muted);
}

.input-wrapper input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background-color: var(--bg-main);
    color: var(--text-main);
    font-size: 15px;
    outline: none;
}
.input-wrapper input:focus {
    border-color: var(--accent);
}

.toggle-password {
    position: absolute;
    right: 16px;
    bottom: 12px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 16px;
}

.btn-submit {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    background-color: var(--accent);
    color: white;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(234, 88, 12, 0.2);
}
.btn-submit:hover {
    background-color: var(--accent-hover);
}

/* Base da Sidebar: Botão de Tema */
.theme-box {
    border-top: 1px solid var(--border);
    padding-top: 20px;
}
.btn-theme {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background-color: var(--bg-main);
    color: var(--text-main);
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

/* --- COLUNA DIREITA: CONTEÚDO / LISTA --- */
.main-content {
    flex: 1;
    padding: 40px;
    overflow-y: auto; /* Rolagem apenas aqui */
    display: flex;
    flex-direction: column;
}

.main-content h3 {
    font-size: 20px;
    margin-bottom: 24px;
    font-weight: 600;
}

/* Lista Layout em Linhas em vez de Cards */
.server-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.server-row {
    background-color: var(--bg-sidebar);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
}
.server-row:hover {
    border-color: var(--text-muted);
}

.server-info {
    display: flex;
    align-items: center;
    gap: 16px;
    min-width: 180px;
}

.status-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background-color: #22c55e;
}

.server-name {
    font-weight: 600;
    font-size: 16px;
}

.server-url-display {
    flex-grow: 1;
    font-size: 13px;
    color: var(--text-muted);
    background-color: var(--bg-main);
    padding: 10px 14px;
    border-radius: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 320px;
}

.row-actions {
    display: flex;
    gap: 8px;
}

.row-actions button {
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    background-color: var(--bg-card);
    color: var(--text-main);
}

.btn-m3u {
    background-color: var(--accent) !important;
    color: white !important;
    border: none !important;
}
.btn-m3u:hover { background-color: var(--accent-hover) !important; }

.row-actions button.copied {
    background-color: #22c55e !important;
    color: white !important;
    border: none !important;
}

.btn-test {
    padding: 10px !important;
}
.btn-test:hover {
    color: #ef4444;
}

/* Estado Vazio (Antes de gerar) */
.empty-state {
    text-align: center;
    padding: 80px 0;
    color: var(--text-muted);
    font-size: 15px;
}

/* Responsivo para Telas menores (vira topo/baixo) */
@media(max-width: 850px){
    body { flex-direction: column; overflow: auto; height: auto; }
    .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .main-content { overflow-y: visible; }
    .server-row { flex-direction: column; align-items: stretch; text-align: center; }
    .server-info { justify-content: center; }
    .server-url-display { max-width: 100%; }
    .row-actions { justify-content: center; }
}
</style>
</head>
<body>

<!-- Sidebar Lateral Fixa -->
<div class="sidebar">
    <div class="top-section">
        <div class="brand">
            <h2>M3U Hub Panel</h2>
            <p>Gerenciador de Conexões</p>
        </div>

        <div class="form-container">
            <div class="input-wrapper">
                <label>Usuário</label>
                <input id="user" placeholder="Digite o acesso">
            </div>
            <div class="input-wrapper">
                <label>Senha</label>
                <input id="pass" type="password" placeholder="Digite a senha">
                <button class="toggle-password" onclick="toggleSenha()" id="toggleBtn" type="button">👁️</button>
            </div>
            <button class="btn-submit" onclick="gerar()">Gerar Acessos</button>
        </div>
    </div>

    <div class="theme-box">
        <button class="btn-theme" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span> <span id="theme-text">Modo Escuro</span>
        </button>
    </div>
</div>

<!-- Conteúdo Principal Dinâmico -->
<div class="main-content">
    <h3>Servidores Disponíveis</h3>
    <div id="resultado">
        <div class="empty-state">Insira as credenciais ao lado e clique em "Gerar Acessos".</div>
    </div>
</div>

<script>
const servidores = [
    {nome:"🧿 Seven", url:"http://seven.blcplay.com"},
    {nome:"💣 Explosion", url:"http://nsync.space"},
    {nome:"⚡ Speed", url:"http://netuno.live"},
    {nome:"🛸 Galaxy", url:"http://galaxy.blcplay.com"},
    {nome:"🌑 Lunar", url:"http://lunar.kkrototv.fun"},
    {nome:"🏛️ Atena", url:"http://atena.kkrototv.fun"},
    {nome:"☀️ Solar", url:"http://solar.kkrototv.fun"},
    {nome:"🌬️ Venus", url:"http://venus.blcplay.com"},
    {nome:"🔥 Fire", url:"http://fire.kkrototv.fun"}
];

function toggleTheme() {
    const body = document.documentElement;
    const currentTheme = body.getAttribute("data-theme");
    const themeIcon = document.getElementById("theme-icon");
    const themeText = document.getElementById("theme-text");

    if (currentTheme === "light") {
        body.removeAttribute("data-theme");
        themeIcon.innerText = "🌙";
        themeText.innerText = "Modo Escuro";
    } else {
        body.setAttribute("data-theme", "light");
        themeIcon.innerText = "☀️";
        themeText.innerText = "Modo Claro";
    }
}

function toggleSenha() {
    const input = document.getElementById("pass");
    const btn = document.getElementById("toggleBtn");
    if (input.type === "password") {
        input.type = "text";
        btn.innerText = "🙈";
    } else {
        input.type = "password";
        btn.innerText = "👁️";
    }
}

function gerar(){
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(!user || !pass){
        alert("Preencha usuário e senha na barra lateral.");
        return;
    }

    let resultado = document.getElementById("resultado");
    resultado.innerHTML = "";

    let listContainer = document.createElement("div");
    listContainer.className = "server-list";

    servidores.forEach((s,i)=>{
        let link = `${s.url}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=mpegts`;

        let row = document.createElement("div");
        row.className = "server-row";
        row.innerHTML = `
            <div class="server-info">
                <div class="status-indicator"></div>
                <div class="server-name">${s.nome}</div>
            </div>
            <div class="server-url-display">${link}</div>
            <div class="row-actions">
                <button id="m3u${i}" class="btn-m3u">Copiar M3U</button>
                <button id="dns${i}">DNS</button>
                <button class="btn-test" onclick="testar('${s.url}')" title="Testar">↗</button>
            </div>
        `;
        listContainer.appendChild(row);
        resultado.appendChild(listContainer);

        document.getElementById(`m3u${i}`).onclick = function(){
            navigator.clipboard.writeText(link);
            this.innerText = "Copiado!";
            this.classList.add("copied");
            setTimeout(() => { this.innerText = "Copiar M3U"; this.classList.remove("copied"); }, 1800);
        };

        document.getElementById(`dns${i}`).onclick = function(){
            navigator.clipboard.writeText(s.url);
            this.innerText = "Copiado!";
            this.classList.add("copied");
            setTimeout(() => { this.innerText = "DNS"; this.classList.remove("copied"); }, 1800);
        };
    });
}

function testar(url){ window.open(url, "_blank"); }
</script>

</body>
</html>
