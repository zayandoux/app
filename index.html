<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de M3U</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    letter-spacing: -0.022em;
}

body {
    margin: 0;
    padding: 0;
    background-color: #f5f5f7; /* Cor clássica de fundo da Apple */
    color: #1d1d1f; /* Preto suave da Apple */
    display: flex;
    justify-content: center;
    padding: 80px 20px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
}

/* Container Principal */
.panel {
    width: 100%;
    max-width: 840px;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 28px;
    border: 1px solid rgba(0, 0, 0, 0.04);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0, 0, 0, 0.02);
    padding: 50px;
}

/* Cabeçalho Premium */
.header {
    text-align: center;
    font-size: 34px;
    font-weight: 700;
    color: #1d1d1f;
    margin-bottom: 40px;
}

/* Área de Inputs */
.login {
    display: flex;
    gap: 16px;
    margin-bottom: 45px;
    align-items: center;
}

.input-container {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
}

.login input {
    width: 100%;
    padding: 16px 20px;
    border-radius: 14px;
    border: 1px solid #d2d2d7;
    background: #fff;
    color: #1d1d1f;
    font-size: 16px;
    outline: none;
    transition: all 0.2s ease-in-out;
}

/* Ajuste de padding para o input que tem o botão de olho */
.login input#pass {
    padding-right: 50px;
}

.login input:focus {
    border-color: #0071e3; /* Azul padrão Apple */
    box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
}

/* Botão de Mostrar/Ocultar Senha */
.toggle-password {
    position: absolute;
    right: 16px;
    background: none;
    border: none;
    cursor: pointer;
    color: #86868b;
    font-size: 18px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Botão Principal */
.login button.btn-principal {
    padding: 16px 32px;
    border-radius: 14px;
    border: none;
    background: #0071e3;
    color: #fff;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.login button.btn-principal:hover {
    background: #0077ed;
}

.login button.btn-principal:active {
    transform: scale(0.98);
}

/* Grid de Resultados */
#resultado {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
}

/* Cards dos Servidores (Clean Style) */
.server {
    background: #ffffff;
    border-radius: 20px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 1px 2px rgba(0,0,0,0.02), 0 4px 12px rgba(0,0,0,0.03);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.server:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.06);
}

.server-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
}

.server-name {
    font-weight: 600;
    font-size: 18px;
    color: #1d1d1f;
}

.server-link {
    font-size: 13px;
    word-break: break-all;
    color: #515154;
    line-height: 1.5;
    margin-bottom: 24px;
    background: #f5f5f7;
    padding: 12px 16px;
    border-radius: 10px;
    user-select: all;
}

.actions {
    display: flex;
    gap: 10px;
}

.actions button {
    flex: 1;
    padding: 12px 0;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
}

/* Cores dos Botões Laterais */
.copy { 
    background: #f5f5f7; 
    color: #0071e3; 
    font-weight: 600;
}
.copy:hover { background: #e8e8ed; }

.dns { 
    background: transparent; 
    color: #515154;
    border: 1px solid #d2d2d7;
}
.dns:hover { 
    background: #f5f5f7; 
}

/* Feedback de sucesso */
.actions button.copiado { 
    background: #34c759 !important; /* Verde Apple */
    color: #fff !important; 
    border-color: #34c759 !important;
}

/* Botão de Link Externo minimalista */
.testar { 
    background: #f5f5f7; 
    color: #86868b; 
    max-width: 48px;
}
.testar:hover { 
    background: #e8e8ed;
    color: #1d1d1f; 
}

/* Ponto de status sutil */
.status-badge {
    width: 7px;
    height: 7px;
    background-color: #34c759;
    border-radius: 50%;
}

/* Responsividade */
@media(max-width: 720px){
    .login { flex-direction: column; align-items: stretch; }
    .input-container { width: 100%; }
    #resultado { grid-template-columns: 1fr; }
    .panel { padding: 24px; }
}
</style>
</head>
<body>

<div class="panel">
    <div class="header">Playlist Generator</div>

    <div class="login">
        <div class="input-container">
            <input id="user" placeholder="Usuário">
        </div>
        <div class="input-container">
            <input id="pass" type="password" placeholder="Senha">
            <button class="toggle-password" onclick="toggleSenha()" id="toggleBtn" type="button">👁️</button>
        </div>
        <button class="btn-principal" onclick="gerar()">Gerar Links</button>
    </div>

    <div id="resultado"></div>
</div>

<script>
// Lista de servidores reordenada conforme solicitado
const servidores = [
    {nome:"🧿 Seven", url:"http://seven.blcplay.com"},
    {nome:"💣 Explosion", url:"http://nsync.space"},
    {nome:"⚡ Speed", url:"http://netuno.live"},
    {nome:"🛸 Galaxy", url:"http://galaxy.blcplay.com"},
    {nome:"🌑 Lunar", url:"http://lunar.kkrototv.fun"},
    {nome:"🏛️ Atena", url:"http://atena.kkrototv.fun"},
    {nome:"☀️ Solar", url:"http://solar.kkrototv.fun"},
    {nome:"🌬️ Venus", url:"http://venus.blcplay.com"},
    {nome:"🔥 Fire", url:"http://fire.kkrototv.fun"}
];

function toggleSenha() {
    const input = document.getElementById("pass");
    const btn = document.getElementById("toggleBtn");
    if (input.type === "password") {
        input.type = "text";
        btn.innerText = "🙈";
    } else {
        input.type = "password";
        btn.innerText = "👁️";
    }
}

function gerar(){
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(!user || !pass){
        alert("Introduza o utilizador e a senha.");
        return;
    }

    let resultado = document.getElementById("resultado");
    resultado.innerHTML = "";

    servidores.forEach((s,i)=>{
        let link = `${s.url}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=mpegts`;

        let div = document.createElement("div");
        div.className = "server";
        div.innerHTML = `
            <div>
                <div class="server-header">
                    <div class="server-name">${s.nome}</div>
                    <div class="status-badge"></div>
                </div>
                <div class="server-link">${link}</div>
            </div>
            <div class="actions">
                <button id="m3u${i}" class="copy">Copiar M3U</button>
                <button id="dns${i}" class="dns">DNS</button>
                <button class="testar" onclick="testar('${s.url}')" title="Testar link">↗</button>
            </div>
        `;
        resultado.appendChild(div);

        document.getElementById(`m3u${i}`).onclick = function(){
            navigator.clipboard.writeText(link);
            this.innerText = "Copiado";
            this.classList.add("copiado");
            setTimeout(() => { this.innerText = "Copiar M3U"; this.classList.remove("copiado"); }, 1800);
        };

        document.getElementById(`dns${i}`).onclick = function(){
            navigator.clipboard.writeText(s.url);
            this.innerText = "Copiado";
            this.classList.add("copiado");
            setTimeout(() => { this.innerText = "DNS"; this.classList.remove("copiado"); }, 1800);
        };
    });
}

function testar(url){ window.open(url, "_blank"); }
</script>

</body>
</html>
