<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FROM • A Calmaria que Vem Antes</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:white;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
}

.hero{
position:relative;
height:100vh;
background:url('https://cdn.mixdeseries.com.br/wp-content/uploads/2026/06/origem-4-temporada-episodio-9-explicado.webp') center/cover;
display:flex;
align-items:flex-end;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:
linear-gradient(
180deg,
rgba(0,0,0,.15) 0%,
rgba(0,0,0,.45) 55%,
rgba(0,0,0,.95) 100%
);
}

.content{
position:relative;
z-index:2;
max-width:700px;
padding:70px;
}

.logo{
font-size:14px;
letter-spacing:2px;
color:#bfbfbf;
margin-bottom:15px;
}

h1{
font-size:72px;
font-weight:700;
line-height:1;
margin-bottom:20px;
}

.description{
font-size:20px;
line-height:1.6;
color:#d0d0d0;
margin-bottom:35px;
}

.watch-btn{
display:inline-flex;
align-items:center;
gap:10px;
background:white;
color:black;
padding:16px 32px;
border-radius:999px;
text-decoration:none;
font-weight:600;
font-size:17px;
}

.player{
max-width:1200px;
margin:auto;
padding:40px 20px 80px;
}

.player h2{
font-size:32px;
margin-bottom:25px;
font-weight:600;
}

.video-box{
position:relative;
padding-top:56.25%;
overflow:hidden;
border-radius:24px;
background:#111;
box-shadow:0 20px 80px rgba(255,255,255,.08);
}

.video-box iframe{
position:absolute;
inset:0;
width:100%;
height:100%;
border:0;
}

footer{
text-align:center;
padding:40px;
color:#777;
font-size:14px;
}

@media(max-width:768px){

.hero{
height:75vh;
background-size:contain;
background-repeat:no-repeat;
background-position:top center;
background-color:#000;
}

.content{
padding:25px;
}

h1{
font-size:42px;
}

.description{
font-size:16px;
}

.watch-btn{
width:100%;
justify-content:center;
}

.player h2{
font-size:24px;
}

.video-box{
border-radius:16px;
}
}

</style>
</head>

<body>

<section class="hero">

<div class="content">

<div class="logo">
Apple TV+ Style Experience
</div>

<h1>A Calmaria que Vem Antes</h1>

<p class="description">
Um raro momento de tranquilidade toma conta de Fromville.
Mas quando tudo parece finalmente em paz,
algo sombrio começa a se aproximar.
</p>

<a href="#assistir" class="watch-btn">
▶ Assistir Agora
</a>

</div>

</section>

<section class="player" id="assistir">

<h2>Temporada 4 • Episódio 9</h2>

<div class="video-box">

<iframe
src="https://drive.google.com/file/d/1l_NxTemZ4rTCr56-JrlKft9RpgFAvgC3/preview"
allowfullscreen>
</iframe>

</div>

</section>

<footer>
FROM • A Calmaria que Vem Antes
</footer>

</body>
</html>
