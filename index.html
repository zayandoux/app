<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FROM — A Calmaria que Vem Antes</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
}

body {
    background: #000000;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding-bottom: 60px;
}

/* Container Principal inspirado no app Apple TV */
.apple-container {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 24px;
}

/* Área do Player e Capa */
.video-wrapper {
    position: relative;
    width: 100%;
    padding-top: 56.25%; /* Mantém a proporção 16:9 perfeita da foto e do vídeo */
    border-radius: 14px;
    overflow: hidden;
    background: #151516;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
}

.video-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
}

/* Capa que cobre o player (100% inteira no mobile e desktop) */
.custom-poster {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: contain; /* Garante que a foto NUNCA seja cortada */
    background-repeat: no-repeat;
    background-position: center;
    background-color: #151516; /* Fundo escuro elegante para preencher se necessário */
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

/* Ícone de Play estilo Apple TV (Círculo desfocado/translúcido) */
.play-button {
    position: relative;
    z-index: 11;
    width: 72px;
    height: 72px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease, background 0.2s ease;
}

.play-button::after {
    content: "";
    display: block;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 12px 0 12px 20px;
    border-color: transparent transparent transparent #ffffff;
    margin-left: 4px;
}

.custom-poster:hover .play-button {
    transform: scale(1.08);
    background: rgba(255, 255, 255, 0.25);
}

.custom-poster.hidden {
    opacity: 0;
    pointer-events: none;
}

/* Detalhes do Episódio (Estilo Apple TV Informações) */
.info-section {
    margin-top: 32px;
    max-width: 700px;
}

/* Etiqueta fosca elegante substituindo o vermelho */
.badge {
    display: inline-block;
    padding: 4px 8px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #aeaeaf;
    text-transform: uppercase;
    margin-bottom: 16px;
}

h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 12px;
}

.meta-info {
    font-size: 15px;
    color: #86868b;
    margin-bottom: 16px;
    font-weight: 500;
}

.description {
    font-size: 17px;
    line-height: 1.5;
    color: #e8e8ed;
    font-weight: 400;
}

/* Rodapé minimalista */
footer {
    text-align: center;
    margin-top: 80px;
    color: #6e6e73;
    font-size: 12px;
}

/* Ajustes finos para telas menores (Celular) */
@media(max-width: 768px){
    .apple-container {
        padding: 20px 16px;
    }
    
    .info-section {
        margin-top: 24px;
    }

    h1 {
        font-size: 26px;
    }

    .description {
        font-size: 15px;
    }

    .play-button {
        width: 60px;
        height: 60px;
    }
}
</style>
</head>

<body>

<main class="apple-container">

    <!-- Player de Vídeo e Capa Unificados -->
    <div class="video-wrapper">
        
        <!-- A Foto aplicada com 'contain' para nunca cortar no celular -->
        <div class="custom-poster" id="videoPoster" style="background-image: url('https://cdn.mixdeseries.com.br/wp-content/uploads/2026/06/origem-4-temporada-episodio-9-explicado.webp');">
            <div class="play-button"></div>
        </div>

        <!-- O Player oculto embaixo da foto -->
        <iframe
            id="videoPlayer"
            src="https://drive.google.com/file/d/1l_NxTemZ4rTCr56-JrlKft9RpgFAvgC3/preview"
            allow="autoplay; fullscreen"
            allowfullscreen>
        </iframe>

    </div>

    <!-- Seção de Texto Estilo Apple TV -->
    <section class="info-section">
        <div class="badge">FROM • TEMPORADA 4</div>
        <h1>A Calmaria que Vem Antes</h1>
        <div class="meta-info">Episódio 9 • Suspense • 2026</div>
        <p class="description">
            Um raro momento de tranquilidade toma conta de Fromville. 
            Mas quando tudo parece finalmente em paz, algo sombrio começa a se aproximar.
        </p>
    </section>

</main>

<footer>
    Apple TV app design inspired • FROM — A Calmaria que Vem Antes
</footer>

<script>
    const poster = document.getElementById('videoPoster');
    const player = document.getElementById('videoPlayer');

    poster.addEventListener('click', () => {
        poster.classList.add('hidden');
        
        // Ativa o autoplay ao clicar na capa
        let videoSrc = player.src;
        if (!videoSrc.includes('autoplay=1')) {
            player.src = videoSrc + (videoSrc.includes('?') ? '&' : '?') + 'autoplay=1';
        }
    });
</script>

</body>
</html>
