<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FROM — A Calmaria que Vem Antes</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
}

body {
    background: #000000;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding-bottom: 60px;
}

/* O topo com a foto da série que você gostava */
.hero {
    height: 45vh;
    background: url('https://api.metro1.com.br/filmes/164,serie-origem-transforma-uma-estrada-em-porta-de-entrada-para-um-suspense-sobre-a-sobrevivencia-e-o-sobrenatural-3.jpg') center center/cover;
    position: relative;
    display: flex;
    align-items: flex-end;
}

.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        180deg,
        rgba(0, 0, 0, 0.1) 0%,
        rgba(0, 0, 0, 0.6) 60%,
        rgba(0, 0, 0, 1) 100%
    );
}

.hero-content {
    position: relative;
    z-index: 2;
    padding: 0 40px 20px;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
}

/* Container Principal do Conteúdo e Player */
.apple-container {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 24px 40px;
}

/* Área do Player de Vídeo */
.video-wrapper {
    position: relative;
    width: 100%;
    padding-top: 56.25%; /* Mantém a proporção 16:9 perfeita */
    border-radius: 14px;
    overflow: hidden;
    background: #151516;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
}

.video-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
}

/* Capa que cobre o player - Modificada para aparecer inteira e centralizada */
.custom-poster {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: contain; /* Garante que a foto do episódio fique 100% inteira no celular */
    background-repeat: no-repeat;
    background-position: center;
    background-color: #151516; /* Fundo escuro para preencher as sobras nas laterais no celular */
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s ease;
}

/* Botão de Play Estilo Apple TV (Vidro translúcido) */
.play-button {
    position: relative;
    z-index: 11;
    width: 72px;
    height: 72px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease, background 0.2s ease;
}

.play-button::after {
    content: "";
    display: block;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 12px 0 12px 20px;
    border-color: transparent transparent transparent #ffffff;
    margin-left: 4px;
}

.custom-poster:hover .play-button {
    transform: scale(1.08);
    background: rgba(255, 255, 255, 0.35);
}

.custom-poster.hidden {
    opacity: 0;
    pointer-events: none;
}

/* Detalhes do Episódio */
.info-section {
    margin-top: 32px;
    max-width: 700px;
}

.badge {
    display: inline-block;
    padding: 5px 10px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #aeaeaf;
    text-transform: uppercase;
    margin-bottom: 14px;
}

h1 {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 8px;
}

.meta-info {
    font-size: 15px;
    color: #86868b;
    margin-bottom: 16px;
}

.description {
    font-size: 17px;
    line-height: 1.5;
    color: #e8e8ed;
}

footer {
    text-align: center;
    margin-top: 60px;
    color: #6e6e73;
    font-size: 12px;
}

/* Responsividade Celular */
@media(max-width: 768px){
    .hero {
        height: 35vh;
    }

    .hero-content {
        padding: 0 16px 15px;
    }

    .apple-container {
        padding: 15px 16px;
    }
    
    .info-section {
        margin-top: 24px;
    }

    h1 {
        font-size: 26px;
    }

    .description {
        font-size: 15px;
    }

    .play-button {
        width: 60px;
        height: 60px;
    }
}
</style>
</head>

<body>

<!-- Topo com a foto original de volta -->
<section class="hero">
    <div class="hero-content">
        <div class="badge">FROM • TEMPORADA 4</div>
    </div>
</section>

<main class="apple-container">

    <!-- Player e Capa com tamanho correto -->
    <div class="video-wrapper">
        
        <!-- Foto do episódio configurada para não cortar no celular -->
        <div class="custom-poster" id="videoPoster" style="background-image: url('https://cdn.mixdeseries.com.br/wp-content/uploads/2026/06/origem-4-temporada-episodio-9-explicado.webp');">
            <div class="play-button"></div>
        </div>

        <iframe
            id="videoPlayer"
            src="https://drive.google.com/file/d/1l_NxTemZ4rTCr56-JrlKft9RpgFAvgC3/preview"
            allow="autoplay; fullscreen"
            allowfullscreen>
        </iframe>

    </div>

    <!-- Informações no estilo Apple TV -->
    <section class="info-section">
        <h1>A Calmaria que Vem Antes</h1>
        <div class="meta-info">Temporada 4 • Episódio 9 • Suspense • 2026</div>
        <p class="description">
            Um raro momento de tranquilidade toma conta de Fromville. 
            Mas quando tudo parece finalmente em paz, algo sombrio começa a se aproximar.
        </p>
    </section>

</main>

<footer>
    FROM — A Calmaria que Vem Antes • Apple TV Style Design
</footer>

<script>
    const poster = document.getElementById('videoPoster');
    const player = document.getElementById('videoPlayer');

    poster.addEventListener('click', () => {
        poster.classList.add('hidden');
        
        let videoSrc = player.src;
        if (!videoSrc.includes('autoplay=1')) {
            player.src = videoSrc + (videoSrc.includes('?') ? '&' : '?') + 'autoplay=1';
        }
    });
</script>

</body>
</html>
