<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FROM • A Calmaria que Vem Antes</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#000;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
}

.hero{
height:55vh;
background:url('https://api.metro1.com.br/filmes/164,serie-origem-transforma-uma-estrada-em-porta-de-entrada-para-um-suspense-sobre-a-sobrevivencia-e-o-sobrenatural-3.jpg') center center/cover;
position:relative;
display:flex;
align-items:flex-end;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
180deg,
rgba(0,0,0,.1),
rgba(0,0,0,.45),
rgba(0,0,0,.95)
);
}

.content{
position:relative;
z-index:2;
padding:50px;
max-width:700px;
}

.logo{
font-size:13px;
letter-spacing:2px;
color:#c0c0c0;
margin-bottom:10px;
}

h1{
font-size:64px;
line-height:1;
margin-bottom:15px;
}

.description{
font-size:19px;
line-height:1.6;
color:#d0d0d0;
}

.player{
max-width:1200px;
margin:auto;
padding:30px 20px 80px;
}

.episode-cover{
width:100%;
border-radius:24px;
overflow:hidden;
margin-bottom:25px;
box-shadow:0 20px 60px rgba(255,255,255,.08);
}

.episode-cover img{
width:100%;
display:block;
}

.player h2{
font-size:32px;
margin-bottom:20px;
}

.video-box{
position:relative;
padding-top:56.25%;
border-radius:24px;
overflow:hidden;
background:#111;
}

.video-box iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

footer{
text-align:center;
padding:40px;
color:#777;
font-size:14px;
border-top:1px solid rgba(255,255,255,.08);
}

/* MOBILE */

@media(max-width:768px){

.hero{
height:40vh;
background-size:cover;
background-position:center;
}

.content{
padding:20px;
}

h1{
font-size:38px;
}

.description{
font-size:15px;
}

.player{
padding:20px 12px 60px;
}

.player h2{
font-size:24px;
}

.episode-cover{
border-radius:16px;
}

.video-box{
border-radius:16px;
}

}

</style>
</head>

<body>

<section class="hero">

<div class="content">

<div class="logo">
FROM • TEMPORADA 4
</div>

<h1>A Calmaria que Vem Antes</h1>

<p class="description">
Um raro momento de tranquilidade toma conta de Fromville.
Mas quando tudo parece finalmente em paz,
algo sombrio começa a se aproximar.
</p>

</div>

</section>

<section class="player">

<div class="episode-cover">
<img src="https://cdn.mixdeseries.com.br/wp-content/uploads/2026/06/origem-4-temporada-episodio-9-explicado.webp" alt="Episódio 9">
</div>

<h2>Temporada 4 • Episódio 9</h2>

<div class="video-box">

<iframe
src="https://drive.google.com/file/d/1l_NxTemZ4rTCr56-JrlKft9RpgFAvgC3/preview"
allow="autoplay; fullscreen"
allowfullscreen>
</iframe>

</div>

</section>

<footer>
FROM • A Calmaria que Vem Antes
</footer>

</body>
</html>
