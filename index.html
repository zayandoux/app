<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FROM - A Calmaria que Vem Antes</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#090909;
    color:#fff;
    font-family:Arial, Helvetica, sans-serif;
}

/* HERO */

.hero{
    position:relative;
    height:100vh;
    background-image:url('https://cdn.mixdeseries.com.br/wp-content/uploads/2026/06/origem-4-temporada-episodio-9-explicado.webp');
    background-size:cover;
    background-position:center;
}

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        rgba(0,0,0,1) 5%,
        rgba(0,0,0,.7) 40%,
        rgba(0,0,0,.2) 100%
    );
}

.content{
    position:absolute;
    bottom:80px;
    left:60px;
    z-index:2;
    max-width:650px;
}

.badge{
    display:inline-block;
    background:#8b0000;
    padding:8px 14px;
    border-radius:6px;
    font-size:12px;
    letter-spacing:2px;
    margin-bottom:20px;
}

h1{
    font-size:64px;
    margin-bottom:15px;
    text-shadow:0 0 15px #000;
}

.subtitle{
    color:#d4d4d4;
    font-size:18px;
    line-height:1.6;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    background:#fff;
    color:#000;
    text-decoration:none;
    padding:15px 35px;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* PLAYER */

.player-section{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;
}

.player-title{
    font-size:42px;
    margin-bottom:25px;
}

.video-container{
    position:relative;
    width:100%;
    padding-top:56.25%;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 30px rgba(255,255,255,.08);
}

.video-container iframe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border:none;
}

/* FOOTER */

footer{
    text-align:center;
    color:#888;
    padding:30px;
}

/* MOBILE */

@media (max-width:768px){

    .hero{
        height:75vh;

        /* mostra imagem inteira */
        background-size:contain;
        background-repeat:no-repeat;
        background-position:top center;
        background-color:#000;
    }

    .content{
        left:20px;
        right:20px;
        bottom:25px;
        max-width:none;
    }

    h1{
        font-size:34px;
    }

    .subtitle{
        font-size:16px;
        line-height:1.5;
    }

    .btn{
        width:100%;
        text-align:center;
    }

    .player-title{
        font-size:28px;
    }

    .player-section{
        padding:30px 15px;
    }

    .video-container{
        border-radius:10px;
    }
}

</style>
</head>

<body>

<section class="hero">

    <div class="overlay"></div>

    <div class="content">

        <div class="badge">
            TEMPORADA 4 • EPISÓDIO 9
        </div>

        <h1>A Calmaria que Vem Antes</h1>

        <p class="subtitle">
            Um raro momento de tranquilidade toma conta de Fromville.
            Mas quando tudo parece finalmente em paz,
            algo sombrio começa a se aproximar.
        </p>

        <a href="#assistir" class="btn">
            ▶ Assistir Agora
        </a>

    </div>

</section>

<section class="player-section" id="assistir">

    <h2 class="player-title">
        Assistir Episódio
    </h2>

    <div class="video-container">

        <iframe
            src="https://drive.google.com/file/d/1l_NxTemZ4rTCr56-JrlKft9RpgFAvgC3/preview"
            allow="autoplay; fullscreen"
            allowfullscreen>
        </iframe>

    </div>

</section>

<footer>
    FROM • Temporada 4 • Episódio 9
</footer>

</body>
</html>
