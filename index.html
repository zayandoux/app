<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FROM - A Calmaria que Vem Antes</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#090909;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
}

.hero{
    position:relative;
    height:100vh;
    background-image:url('https://cdn.mixdeseries.com.br/wp-content/uploads/2026/06/origem-4-temporada-episodio-9-explicado.webp');
    background-size:cover;
    background-position:center;
}

.overlay{
    position:absolute;
    inset:0;
    background:
    linear-gradient(to top,
    rgba(0,0,0,1) 10%,
    rgba(0,0,0,.75) 40%,
    rgba(0,0,0,.35) 100%);
}

.content{
    position:absolute;
    bottom:80px;
    left:60px;
    z-index:2;
    max-width:650px;
}

.badge{
    display:inline-block;
    background:#8b0000;
    padding:8px 14px;
    border-radius:5px;
    font-size:12px;
    letter-spacing:2px;
    margin-bottom:20px;
}

h1{
    font-size:64px;
    margin-bottom:15px;
    text-shadow:0 0 20px #000;
}

.subtitle{
    color:#d0d0d0;
    font-size:18px;
    line-height:1.6;
    margin-bottom:25px;
}

.btn{
    display:inline-block;
    background:white;
    color:black;
    text-decoration:none;
    padding:15px 35px;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
}

.player-section{
    padding:50px 20px;
    max-width:1200px;
    margin:auto;
}

.player-title{
    font-size:32px;
    margin-bottom:20px;
}

.video-container{
    position:relative;
    width:100%;
    padding-top:56.25%;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 30px rgba(255,255,255,.08);
}

.video-container iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
}

footer{
    text-align:center;
    padding:30px;
    color:#888;
}
</style>
</head>

<body>

<section class="hero">
    <div class="overlay"></div>

    <div class="content">
        <div class="badge">TEMPORADA 4 • EPISÓDIO 9</div>

        <h1>A Calmaria que Vem Antes</h1>

        <p class="subtitle">
            Um raro momento de tranquilidade toma conta de Fromville.
            Mas quando tudo parece finalmente em paz,
            algo sombrio começa a se aproximar.
        </p>

        <a href="#assistir" class="btn">
            ▶ Assistir Agora
        </a>
    </div>
</section>

<section class="player-section" id="assistir">
    <h2 class="player-title">Assistir Episódio</h2>

    <div class="video-container">
        <iframe
            src="https://drive.google.com/file/d/1l_NxTemZ4rTCr56-JrlKft9RpgFAvgC3/preview"
            allow="autoplay; fullscreen"
            allowfullscreen>
        </iframe>
    </div>
</section>

<footer>
    FROM • Episódio 9 — A Calmaria que Vem Antes
</footer>

</body>
</html>
